services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hxm-oshop-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_SSLMODE: disable
      db_host: db
      db_port: 5432
      db_user: ${POSTGRES_USER:-oshop}
      db_password: ${POSTGRES_PASSWORD:-change-me}
      db_name: ${POSTGRES_DB:-oshop}
      DATABASE_URL: postgresql://${POSTGRES_USER:-oshop}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-oshop}?sslmode=disable
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

